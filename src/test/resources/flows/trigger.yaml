id: trigger
namespace: io.kestra.tests

triggers:
  - id: watch
    type: io.kestra.plugin.redis.list.Trigger
    url: redis://:redis@localhost:6379/0
    key: mytriggerkey_trigger
    count: 2
    maxRecords: 2

tasks:
  - id: end
    type: io.kestra.plugin.core.debug.Return
    format: "{{task.id}} > {{taskrun.startDate}}"
